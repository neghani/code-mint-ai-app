# Local Postgres for CodeMintAI. Usage:
#
#   docker-compose up -d
#   cp .env.example .env   # if needed, then set JWT_SECRET etc.
#   npx prisma db push && npx prisma db seed
#   npm run dev
#
# .env should include: DATABASE_URL="postgresql://codemint:codemint@localhost:5432/codemint"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: codemint
      POSTGRES_PASSWORD: codemint
      POSTGRES_DB: codemint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemint -d codemint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: {}
